name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project OpenScreenshot.xcodeproj \
            -scheme OpenScreenshot \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
